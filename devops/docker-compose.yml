x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  rabbitmq:
    container_name: pass-rabbitmq
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    networks:
      - pass-network
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.25
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.10"

  account:
    container_name: pass-account
    image: ${REGISTRY_HOST}:${REGISTRY_PORT}/account:latest
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pass-network
    env_file:
      - .env
    environment:
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRING_POSTGRES}
      - JwtSettings__SecretKey=${JWT_SECRET}
      - JwtSettings__AccessTokenExpirationInSeconds=${JWT_ACCESS_TOKEN_EXPIRATION_IN_SECONDS}
      - JwtSettings__MFATokenExpirationInSeconds=${JWT_MFA_TOKEN_EXPIRATION_IN_SECONDS}
      - MFAEmailSettings__HashSecret=${MFA_EMAIL_HASH_SECRET}
      - MFAEmailSettings__TokenExpiresInSeconds=${MFA_EMAIL_TOKEN_EXPIRES_IN_SECONDS}
      - MFAEmailSettings__MaxAttempts=${MFA_EMAIL_MAX_ATTEMPTS}
      - MessageBrokerConnectionOptions__HostName=${RABBITMQ_HOST}
      - MessageBrokerConnectionOptions__Port=${RABBITMQ_PORT}
      - MessageBrokerConnectionOptions__UserName=${RABBITMQ_USER}
      - MessageBrokerConnectionOptions__Password=${RABBITMQ_PASSWORD}
      - MessageBrokerConnectionOptions__AutomaticRecoveryEnabled=${RABBITMQ_AUTOMATIC_RECOVERY_ENABLED}
    logging: *default-logging
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.30
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.30"
        reservations:
          memory: 64M
          cpus: "0.15"

  vaultify:
    container_name: pass-vaultify
    image: ${REGISTRY_HOST}:${REGISTRY_PORT}/vaultify:latest
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pass-network
    env_file:
      - .env
    environment:
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRING_POSTGRES}
      - JwtSettings__SecretKey=${JWT_SECRET}
    logging: *default-logging
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.30
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.30"
        reservations:
          memory: 64M
          cpus: "0.15"
  notification:
    container_name: pass-notification
    image: ${REGISTRY_HOST}:${REGISTRY_PORT}/notification:latest
    depends_on:
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    networks:
      - pass-network
    env_file:
      - .env
    environment:
      - MessageBrokerConnectionOptions__HostName=${RABBITMQ_HOST}
      - MessageBrokerConnectionOptions__Port=${RABBITMQ_PORT}
      - MessageBrokerConnectionOptions__UserName=${RABBITMQ_USER}
      - MessageBrokerConnectionOptions__Password=${RABBITMQ_PASSWORD}
      - MessageBrokerConnectionOptions__AutomaticRecoveryEnabled=${RABBITMQ_AUTOMATIC_RECOVERY_ENABLED}
      - EmailSettingsOptions__Host=${EMAIL_HOST}
      - EmailSettingsOptions__Port=${EMAIL_PORT}
      - EmailSettingsOptions__FromEmail=${EMAIL_FROM}
      - EmailSettingsOptions__FromName=${EMAIL_FROM_NAME}
      - EmailSettingsOptions__Username=${EMAIL_USERNAME}
      - EmailSettingsOptions__Password=${EMAIL_PASSWORD}
    logging: *default-logging
    mem_limit: 64m
    memswap_limit: 96m
    cpus: 0.15
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 32M
          cpus: "0.08"
  gw:
    container_name: pass-gw
    image: ${REGISTRY_HOST}:${REGISTRY_PORT}/gw:latest
    ports:
      - "${GW_PORT}:${GW_INTERNAL_PORT}"
    restart: unless-stopped
    networks:
      - pass-network
    logging: *default-logging
    mem_limit: 48m
    memswap_limit: 72m
    cpus: 0.10
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: "0.10"
        reservations:
          memory: 24M
          cpus: "0.05"

networks:
  pass-network:
    external: true
    name: pass-network
