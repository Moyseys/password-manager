x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  registry:
    container_name: pass-registry
    build:
      context: ./registry
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - pass-network
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      OTEL_TRACES_EXPORTER: none
      OTEL_SDK_DISABLED: "true"
      OTEL_METRICS_EXPORTER: none
      REGISTRY_HTTP_SECRET: ${REGISTRY_HTTP_SECRET}
    ports:
      - "${REGISTRY_PORT}:${REGISTRY_INTERNAL_PORT}"
    volumes:
      - ./registry/registry/data:/var/lib/registry
    logging: *default-logging
    mem_limit: 256m
    memswap_limit: 384m
    cpus: 0.25
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.10"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${REGISTRY_PORT}/v2/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    container_name: pass-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - pass-network
    environment:
      - GW_INTERNAL_PORT=${GW_INTERNAL_PORT}
      - REGISTRY_INTERNAL_PORT=${REGISTRY_INTERNAL_PORT}
      - GW_DOMAIN=${GW_DOMAIN}
      - REGISTRY_DOMAIN=${REGISTRY_DOMAIN}
      - CERT_PATH_HOST=${CERT_PATH_HOST}
    volumes:
      - ${CERT_BASE}:${CERT_BASE}:ro
    logging: *default-logging
    mem_limit: 128m
    memswap_limit: 192m
    cpus: 0.15
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
        reservations:
          memory: 64M
          cpus: "0.08"

networks:
  pass-network:
    driver: bridge
    name: pass-network
